<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Flitt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body data-user-id="{{ user_id|default(0) }}" class="theme-dark">
    <div class="messenger-container">
        <!-- Список пользователей (левая колонка) -->
        <div class="users-sidebar" id="usersSidebar">
            <div class="sidebar-header">
                <div class="menu-container">
                    <button class="btn-menu" id="menuBtn" aria-label="Меню">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="menu-dropdown" id="menuDropdown">
                        <button class="menu-item" id="profileMenuItem">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <span>Профиль</span>
                        </button>
                        {% if is_admin %}
                        <button class="menu-item" id="adminMenuItem">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1l3 5 5 .75-3.5 3.5.8 5-5.3-2.8L7.7 15l.8-5L5 6.75 10 6z"></path>
                            </svg>
                            <span>Админка</span>
                        </button>
                        {% endif %}
                        <button class="menu-item" id="themeToggle">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                            </svg>
                            <span id="themeToggleText">Светлая тема</span>
                        </button>
                        <button class="menu-item" id="logoutMenuItem">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                            <span>Выход из аккаунта</span>
                        </button>
                    </div>
                </div>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Поиск по нику или номеру..." 
                    autocomplete="off"
                >
            </div>
            <div class="chats-list" id="chatsList">
                <!-- Список чатов будет загружен через JS -->
            </div>
            <div class="friends-container">
                <div class="friends-title">Мои друзья</div>
                <div class="friends-list" id="friendsList">
                    <div class="empty-users">Список друзей пуст</div>
                </div>
            </div>
            <div class="users-list" id="usersList" style="display: none;">
                <div class="empty-users">Начните поиск по номеру телефона</div>
            </div>
        </div>

        <!-- Область чата (правая колонка) -->
        <div class="chat-area" id="chatArea">
            <div class="chat-placeholder" id="chatPlaceholder">
                <div class="placeholder-content">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p>Выберите пользователя для начала чата</p>
                </div>
            </div>

            <!-- Активный чат -->
            <div class="chat-window" id="chatWindow" style="display: none;">
                <div class="chat-header telegram-header">
                    <button class="btn-back mobile-only" id="backBtn" aria-label="Назад к списку">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <div class="chat-user-avatar-small">
                        <span id="chatUserAvatarText">--</span>
                    </div>
                    <div class="chat-user-info">
                        <span class="chat-user-name" id="chatUserName">Пользователь</span>
                        <span class="chat-user-status" id="chatUserStatus"></span>
                    </div>
                    <div class="chat-header-actions">
                        <button class="btn-header-action" id="searchBtn" aria-label="Поиск">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                        <button class="btn-header-action" id="menuBtnChat" aria-label="Меню">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="1"></circle>
                                <circle cx="19" cy="12" r="1"></circle>
                                <circle cx="5" cy="12" r="1"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="chat-messages telegram-messages" id="chatMessages">
                    <!-- Сообщения будут загружены через JS -->
                </div>
                <div class="chat-input-container telegram-input">
                    <form id="messageForm" class="chat-input-form" enctype="multipart/form-data">
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                        <button type="button" class="btn-attach" id="attachBtn" aria-label="Вложения">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="messageInput" 
                                placeholder="Сообщение..." 
                                autocomplete="off"
                            >
                        </div>
                        <button type="button" class="btn-emoji" id="emojiBtn" aria-label="Эмодзи">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                                <line x1="9" y1="9" x2="9.01" y2="9"></line>
                                <line x1="15" y1="9" x2="15.01" y2="9"></line>
                            </svg>
                        </button>
                        <button type="submit" class="btn-send telegram-send" id="sendBtn" aria-label="Отправить">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <div id="notificationsContainer" class="notifications-container" aria-live="polite"></div>
    
    <!-- Контекстное меню для сообщений -->
    <div class="message-context-menu" id="messageContextMenu">
        <div class="context-menu-header">
            <div class="context-menu-message-preview" id="contextMenuMessagePreview">
                <div class="context-menu-message-text" id="contextMenuMessageText"></div>
                <div class="context-menu-message-meta" id="contextMenuMessageMeta"></div>
            </div>
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-items">
            <button class="context-menu-item" id="contextMenuReply" data-action="reply">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 10 4 15 9 20"></polyline>
                    <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
                </svg>
                <span>Ответить</span>
            </button>
            <button class="context-menu-item" id="contextMenuEdit" data-action="edit">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <span>Изменить</span>
            </button>
            <button class="context-menu-item" id="contextMenuPin" data-action="pin">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 17v5"></path>
                    <path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a5 5 0 0 0-10 0v3.76z"></path>
                </svg>
                <span>Закрепить</span>
            </button>
            <div class="context-menu-divider"></div>
            <button class="context-menu-item" id="contextMenuCopy" data-action="copy">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span>Копировать текст</span>
            </button>
            <button class="context-menu-item" id="contextMenuForward" data-action="forward">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 17 20 12 15 7"></polyline>
                    <path d="M4 18v-2a4 4 0 0 1 4-4h12"></path>
                </svg>
                <span>Переслать</span>
            </button>
            <div class="context-menu-divider"></div>
            <button class="context-menu-item" id="contextMenuSelect" data-action="select">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Выделить</span>
            </button>
            <button class="context-menu-item context-menu-item-danger" id="contextMenuDelete" data-action="delete">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                <span>Удалить</span>
            </button>
        </div>
    </div>
    
    <!-- Модальное окно профиля -->
    <div class="profile-modal" id="profileModal">
        <div class="profile-modal-backdrop" id="profileModalBackdrop"></div>
        <div class="profile-modal-content">
            <div class="profile-modal-header">
                <button class="profile-edit-btn" id="profileEditBtn" aria-label="Редактировать">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </button>
                <button class="profile-close-btn" id="profileCloseBtn" aria-label="Закрыть">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="profile-modal-body">
                <div class="profile-avatar" id="profileAvatar">
                    <img id="profileAvatarImage" class="profile-avatar-image" alt="Аватар" style="display: none;">
                    <span id="profileAvatarText">--</span>
                </div>
                <input type="file" id="profileAvatarFile" accept="image/*" style="display: none;">
                <div class="profile-info">
                    <div class="profile-username-container">
                        <h2 class="profile-username" id="profileUsername">Не указан</h2>
                        <input type="text" class="profile-username-input" id="profileUsernameInput" placeholder="Введите ник" maxlength="50" style="display: none;">
                    </div>
                    <div class="profile-phone-id">
                        <span id="profilePhoneId">--</span>
                    </div>
                </div>
                <div class="profile-actions" id="profileActions" style="display: none;">
                    <button class="btn-profile-save" id="profileSaveBtn">Сохранить</button>
                    <button class="btn-profile-cancel" id="profileCancelBtn">Отмена</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const CURRENT_USER_ID = parseInt(document.body.getAttribute('data-user-id')) || 0;
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
    <script src="{{ url_for('static', filename='js/context-menu.js') }}"></script>
</body>
</html>
