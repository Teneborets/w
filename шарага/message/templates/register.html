<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Регистрация - Мессенджер</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Регистрация</h1>
                <p>Создайте новый аккаунт</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Например, flitt_user" 
                        required
                        autocomplete="username"
                        maxlength="30"
                    >
                    <small class="form-hint">Уникальное имя, минимум 3 символа, без пробелов</small>
                </div>
                
                <div class="form-group">
                    <label for="phone">Номер телефона</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="+7 (999) 123-45-67" 
                        required
                        autocomplete="tel"
                    >
                    <small class="form-hint">Введите номер телефона (только цифры, минимум 10 символов)</small>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Введите пароль" 
                        required
                        autocomplete="new-password"
                        minlength="6"
                    >
                    <small class="form-hint">Минимум 6 символов</small>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Подтвердите пароль</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Повторите пароль" 
                        required
                        autocomplete="new-password"
                    >
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary">
                    <span>Зарегистрироваться</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
