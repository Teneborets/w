<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка — Flitt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="theme-dark">
    <div class="messenger-container" style="flex-direction: column;">
        <div class="sidebar-header" style="border-bottom: 1px solid var(--tg-border);">
            <div style="display:flex;align-items:center;gap:12px;flex:1;">
                <button class="btn-back" onclick="window.location.href='{{ url_for('dashboard') }}'" aria-label="Назад к чату">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div>
                    <div style="color:var(--tg-text-primary);font-weight:600;">Админ-панель</div>
                    <div style="color:var(--tg-text-secondary);font-size:13px;">Список всех пользователей</div>
                </div>
            </div>
        </div>

        <div style="padding:12px 16px;overflow:auto;flex:1;background:var(--tg-bg-primary);">
            <table style="width:100%;border-collapse:collapse;font-size:14px;">
                <thead>
                    <tr style="border-bottom:1px solid var(--tg-border);color:var(--tg-text-secondary);">
                        <th style="text-align:left;padding:8px 4px;">ID</th>
                        <th style="text-align:left;padding:8px 4px;">Телефон</th>
                        <th style="text-align:left;padding:8px 4px;">Ник</th>
                        <th style="text-align:left;padding:8px 4px;">User ID</th>
                        <th style="text-align:left;padding:8px 4px;">Админ</th>
                        <th style="text-align:left;padding:8px 4px;">Создан</th>
                        <th style="text-align:left;padding:8px 4px;">Активность</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %}
                    <tr style="border-bottom:1px solid var(--tg-border);">
                        <td style="padding:6px 4px;color:var(--tg-text-primary);">{{ u.id }}</td>
                        <td style="padding:6px 4px;color:var(--tg-text-primary);white-space:nowrap;">{{ u.phone }}</td>
                        <td style="padding:6px 4px;color:var(--tg-text-primary);">
                            {{ u.username or '—' }}
                        </td>
                        <td style="padding:6px 4px;color:var(--tg-text-secondary);font-size:12px;">
                            {{ u.user_id }}
                        </td>
                        <td style="padding:6px 4px;">
                            {% if u.is_admin %}
                                <span style="color:#4CAF50;font-weight:600;">Да</span>
                            {% else %}
                                <span style="color:var(--tg-text-secondary);">Нет</span>
                            {% endif %}
                        </td>
                        <td style="padding:6px 4px;color:var(--tg-text-secondary);font-size:12px;">
                            {{ u.created_at }}
                        </td>
                        <td style="padding:6px 4px;color:var(--tg-text-secondary);font-size:12px;">
                            {{ u.last_activity or '—' }}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
